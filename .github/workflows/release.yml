name: Release

on:
  push:
    tags:
      - "*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Set up Go 1.25
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
        id: go

      - name: Print version info
        id: semver
        run: |
          make version

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          client-id: ${{ secrets.GHCRX_APP_CLIENT_ID }}
          private-key: ${{ secrets.GHCRX_APP_PRIVATE_KEY }}
          owner: appscode

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ steps.app-token.outputs.app-slug }}[bot]
          password: ${{ steps.app-token.outputs.token }}

      - name: Publish to GitHub Container Registry
        env:
          REGISTRY: ghcr.io/appscode
          APPSCODE_ENV: prod
        run: |
          make release COMPRESS=yes

      - name: Release
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77 # v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/offline-license-server-darwin-amd64.tar.gz
            bin/offline-license-server-darwin-arm64.tar.gz
            bin/offline-license-server-linux-amd64.tar.gz
            bin/offline-license-server-linux-arm64.tar.gz
            bin/offline-license-server-windows-amd64.zip
            bin/offline-license-server-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
