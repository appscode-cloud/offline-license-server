<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AppsCode Software License Agreement</title>
    <link rel="shortcut icon" href="https://cdn.appscode.com/images/products/appscode/icons/favicon.ico">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
  </head>
  <body>
    <section class="section has-text-centered">
      <img src="https://cdn.appscode.com/images/products/appscode/appscode.png" alt="AppsCode" />
      <h1 class="title">AppsCode EULA Generator</h1>
    </section>
    <section class="section pt-0">
      <div class="container">
        <div class="columns is-mobile is-centered">
          <div class="column is-half">
            <form action="/_/eula" method="post">
              <div class="field">
                <label class="label">Company Legal Name</label>
                <div class="control">
                  <input
                    name="company"
                    class="input"
                    type="text"
                    placeholder=""
                  />
                </div>
              </div>

              <div class="field">
                <label class="label">Company Website</label>
                <div class="control">
                  <input
                    name="domain"
                    class="input"
                    type="text"
                    placeholder=""
                    value=""
                  />
                </div>
                <!-- <p class="help is-danger">This email is invalid</p> -->
              </div>

              <div class="field">
                <label class="label">Company Legal Address</label>
                <div class="control">
                  <input
                    name="address"
                    class="input"
                    type="text"
                    placeholder=""
                    value=""
                  />
                </div>
                <!-- <p class="help is-danger">This email is invalid</p> -->
              </div>

              <div class="field">
                <label class="label">Quotation #</label>
                <div class="control">
                  <input
                    name="quotation"
                    class="input"
                    type="text"
                    placeholder=""
                    value=""
                  />
                </div>
                <!-- <p class="help is-danger">This email is invalid</p> -->
              </div>

              <div class="field">
                <label class="label">Product Name</label>
                <div class="control">
                  <div class="select">
                    <select id="product" name="product">
                      <option>KubeDB Enterprise</option>
                      <option>Stash Enterprise</option>
                      <option>KubeVault Enterprise</option>
                      <option>Kubeform Enterprise</option>
                      <option>Voyager Enterprise</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="label">Payment Terms</label>
                <div class="control">
                  <div class="select">
                    <select id="payment-term" name="payment-term">
                      <option value="annual">
                        Annual
                      </option>
                      <option value="payg">
                        PAYG
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="label">Support Plan</label>
                <div class="control">
                  <div class="select">
                    <select id="support-plan" name="support-plan">
                      <option value="standard">
                        Standard
                      </option>
                      <option value="premium">
                        Premium
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="field is-grouped">
                <div class="control">
                  <button class="button is-link" value="submit">Generate Contract</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
