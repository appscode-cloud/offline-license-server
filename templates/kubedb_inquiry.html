<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KubeDB Inquiry</title>
    <link rel="shortcut icon" href="https://cdn.appscode.com/images/products/appscode/icons/favicon.ico">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <section class="section has-text-centered">
      <img src="https://cdn.appscode.com/images/products/appscode/appscode.png" alt="AppsCode" />
      <h1 class="title">KubeDB Inquiry</h1>
      <p class="subtitle">Submit an inquiry for KubeDB</p>
    </section>
    <section class="section pt-0">
      <div class="container">
        <div class="columns is-mobile is-centered">
          <div class="column is-two-thirds">

            <form action="/_/kubedb_inquiry" method="post">

              <h3 class="title is-4">Customer Information</h3>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Name *</label>
                    <div class="control">
                      <input
                        name="customer-name"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Email *</label>
                    <div class="control">
                      <input
                        name="customer-email"
                        class="input"
                        type="email"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Company *</label>
                    <div class="control">
                      <input
                        name="customer-company"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Phone</label>
                    <div class="control">
                      <input
                        name="customer-phone"
                        class="input"
                        type="tel"
                        placeholder=""
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Address *</label>
                    <div class="control">
                      <input
                        name="customer-address"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Country *</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="customer-country" required>
                          <option value="">-- Select Country --</option>
                          <option value="United States of America">United States of America</option>
                          <option value="Afghanistan">Afghanistan</option>
                          <option value="Albania">Albania</option>
                          <option value="Algeria">Algeria</option>
                          <option value="Andorra">Andorra</option>
                          <option value="Angola">Angola</option>
                          <option value="Antigua and Barbuda">Antigua and Barbuda</option>
                          <option value="Argentina">Argentina</option>
                          <option value="Armenia">Armenia</option>
                          <option value="Australia">Australia</option>
                          <option value="Austria">Austria</option>
                          <option value="Azerbaijan">Azerbaijan</option>
                          <option value="Bahamas">Bahamas</option>
                          <option value="Bahrain">Bahrain</option>
                          <option value="Bangladesh">Bangladesh</option>
                          <option value="Barbados">Barbados</option>
                          <option value="Belarus">Belarus</option>
                          <option value="Belgium">Belgium</option>
                          <option value="Belize">Belize</option>

                          <option value="Burkina Faso">Burkina Faso</option>
                          <option value="Burundi">Burundi</option>
                          <option value="Cambodia">Cambodia</option>
                          <option value="Cameroon">Cameroon</option>
                          <option value="Canada">Canada</option>
                          <option value="Chile">Chile</option>
                          <option value="China">China</option>
                          <option value="Colombia">Colombia</option>
                          <option value="Costa Rica">Costa Rica</option>
                          <option value="Croatia">Croatia</option>
                          <option value="Cyprus">Cyprus</option>
                          <option value="Czech Republic">Czech Republic</option>
                          <option value="Denmark">Denmark</option>

                          <option value="Israel">Israel</option>
                          <option value="Italy">Italy</option>

                          <option value="Jordan">Jordan</option>
                          <option value="Kazakhstan">Kazakhstan</option>
                          <option value="Kenya">Kenya</option>
                          <option value="Kuwait">Kuwait</option>
                          <option value="Latvia">Latvia</option>
                          <option value="Lebanon">Lebanon</option>
                          <option value="Lithuania">Lithuania</option>
                          <option value="Luxembourg">Luxembourg</option>
                          <option value="Malaysia">Malaysia</option>
                          <option value="Maldives">Maldives</option>
                          <option value="Malta">Malta</option>
                          <option value="Mexico">Mexico</option>
                          <option value="Moldova">Moldova</option>
                          <option value="Monaco">Monaco</option>
                          <option value="Mongolia">Mongolia</option>
                          <option value="Montenegro">Montenegro</option>
                          <option value="Morocco">Morocco</option>
                          <option value="Myanmar">Myanmar</option>

                          <option value="Slovenia">Slovenia</option>

                          <option value="South Korea">South Korea</option>
                          <option value="Spain">Spain</option>
                          <option value="Sri Lanka">Sri Lanka</option>
                          <option value="Sudan">Sudan</option>
                          <option value="Sweden">Sweden</option>
                          <option value="Switzerland">Switzerland</option>
                          <option value="Syria">Syria</option>

                          <option value="Tanzania">Tanzania</option>
                          <option value="Thailand">Thailand</option>
                          <option value="Trinidad and Tobago">Trinidad and Tobago</option>
                          <option value="Tunisia">Tunisia</option>
                          <option value="Turkey">Turkey</option>
                          <option value="Uganda">Uganda</option>
                          <option value="Ukraine">Ukraine</option>
                          <option value="United Arab Emirates">United Arab Emirates</option>
                          <option value="United Kingdom">United Kingdom</option>

                          <option value="Uzbekistan">Uzbekistan</option>
                          <option value="Venezuela">Venezuela</option>
                          <option value="Vietnam">Vietnam</option>
                          <option value="Yemen">Yemen</option>
                          <option value="Zambia">Zambia</option>
                          <option value="Zimbabwe">Zimbabwe</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <hr/>

              <h3 class="title is-4">Deal Information</h3>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Kubernetes Setup</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="kubernetes-setup">
                          <option value="">-- Select Setup --</option>
                          <option value="Red Hat OpenShift">Red Hat OpenShift</option>
                          <option value="Rancher by SUSE">Rancher by SUSE</option>
                          <option value="Kubernetes on OpenStack">Kubernetes on OpenStack</option>
                          <option value="Nutanix Kubernetes Platform (NKP)">Nutanix Kubernetes Platform (NKP)</option>
                          <option value="Mirantis Kubernetes Engine">Mirantis Kubernetes Engine</option>
                          <option value="VMware Tanzu Kubernetes Grid (TKG)">VMware Tanzu Kubernetes Grid (TKG)</option>
                          <option value="Amazon EKS">Amazon EKS</option>
                          <option value="Azure AKS">Azure AKS</option>
                          <option value="Google GKE">Google GKE</option>
                          <option value="Other Kubernetes Distribution">Other Kubernetes Distribution</option>
                          <option value="Not using Kubernetes Yet">Not using Kubernetes Yet</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Estimated Database Memory (GB)</label>
                    <div class="control">
                      <input
                        name="estimated-database-memory"
                        class="input"
                        type="text"
                        placeholder=""
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Support Plan</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="support-plan">
                          <option value="">-- Select Plan --</option>
                          <option value="Standard">Standard (9x5)</option>
                          <option value="Platinum">Premium (24x7)</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Professional Services</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="professional-services">
                          <option value="">-- Select --</option>
                          <option value="Yes">Yes</option>
                          <option value="No">No</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Project Timeline</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="project-timeline">
                          <option value="">-- Select Timeline --</option>
                          <option value="Immediate">Immediate</option>
                          <option value="Within 30 days">Within 30 days</option>
                          <option value="Within 90 days">Within 90 days</option>
                          <option value="Within 6 months">Within 6 months</option>
                          <option value="Next year">Next year</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="column">
                </div>
              </div>

              <div class="field">
                <label class="label">Notes</label>
                <div class="control">
                  <textarea
                    name="notes"
                    class="textarea"
                    placeholder="Any additional details about the deal opportunity"
                  ></textarea>
                </div>
              </div>

              {{if .RecaptchaSiteKey}}
              <div class="field">
                <div class="g-recaptcha" data-sitekey="{{.RecaptchaSiteKey}}" data-callback="onRecaptchaSuccess" data-expired-callback="onRecaptchaExpired"></div>
              </div>
              {{end}}

              <div class="field is-grouped">
                <div class="control">
                  <button id="submit-btn" class="button is-link" type="submit">Submit</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    {{if .RecaptchaSiteKey}}
    <script>
      document.getElementById('submit-btn').disabled = true;
      function onRecaptchaSuccess() {
        document.getElementById('submit-btn').disabled = false;
      }
      function onRecaptchaExpired() {
        document.getElementById('submit-btn').disabled = true;
      }
    </script>
    {{end}}
  </body>
</html>
