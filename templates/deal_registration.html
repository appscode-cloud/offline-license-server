<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AppsCode Deal Registration</title>
    <link rel="shortcut icon" type="image/png" href="https://cdn.appscode.com/images/products/appscode/icons/favicon-32x32.png">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.0/css/bulma.min.css"
    />
  </head>
  <body>
    <section class="section">
      <div class="container">
        <div class="columns is-mobile is-centered">
          <div class="column is-two-thirds">
            <h1 class="title">AppsCode Deal Registration</h1>
            <p class="subtitle">Register a new deal opportunity with AppsCode</p>

            <form action="/_/deal-registration" method="post">

              <h3 class="title is-4">Partner Information</h3>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Partner Name *</label>
                    <div class="control">
                      <input
                        name="partner-name"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Partner Email *</label>
                    <div class="control">
                      <input
                        name="partner-email"
                        class="input"
                        type="email"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Partner Company *</label>
                    <div class="control">
                      <input
                        name="partner-company"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Region *</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="region" required>
                          <option value="">-- Select Region --</option>
                          <option value="Americas">Americas</option>
                          <option value="EMEA">EMEA</option>
                          <option value="APAC">APAC</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <hr/>

              <h3 class="title is-4">Customer Information</h3>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Name *</label>
                    <div class="control">
                      <input
                        name="customer-name"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Email *</label>
                    <div class="control">
                      <input
                        name="customer-email"
                        class="input"
                        type="email"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Company *</label>
                    <div class="control">
                      <input
                        name="customer-company"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Phone</label>
                    <div class="control">
                      <input
                        name="customer-phone"
                        class="input"
                        type="tel"
                        placeholder=""
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Address *</label>
                    <div class="control">
                      <input
                        name="customer-address"
                        class="input"
                        type="text"
                        placeholder=""
                        required
                      />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Customer Country *</label>
                    <div class="control">

                          <option value="Spain">Spain</option>

                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <hr/>

              <h3 class="title is-4">Deal Information</h3>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Product *</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="product" required>
                          <option value="">-- Select Product --</option>
                          <option value="KubeDB Enterprise">KubeDB Enterprise</option>
                          <option value="Stash Enterprise">Stash Enterprise</option>
                          <option value="KubeVault Enterprise">KubeVault Enterprise</option>
                          <option value="Voyager Enterprise">Voyager Enterprise</option>
                          <option value="Platform Enterprise">Platform Enterprise</option>
                          <option value="Config Syncer Enterprise">Config Syncer Enterprise</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Estimated Deal Size</label>
                    <div class="control">
                      <input
                        name="estimated-deal-size"
                        class="input"
                        type="text"
                        placeholder=""
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label">Project Timeline</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select name="project-timeline">
                          <option value="">-- Select Timeline --</option>
                          <option value="Immediate">Immediate</option>
                          <option value="Within 30 days">Within 30 days</option>
                          <option value="Within 90 days">Within 90 days</option>
                          <option value="Within 6 months">Within 6 months</option>
                          <option value="Next year">Next year</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Competitor Product</label>
                    <div class="control">
                      <input
                        name="competitor-product"
                        class="input"
                        type="text"
                        placeholder=""
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="label">Notes</label>
                <div class="control">
                  <textarea
                    name="notes"
                    class="textarea"
                    placeholder="Any additional details about the deal opportunity"
                  ></textarea>
                </div>
              </div>

              <div class="field is-grouped">
                <div class="control">
                  <button class="button is-link" type="submit">Submit Deal Registration</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
